<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Acontece no Mercado</title>
  <link rel="icon" type="image/x-icon" href="./favicon.ico">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f4f6f9;
      --white: #ffffff;
      --border: #e2e8f0;
      --text: #1a202c;
      --text2: #4a5568;
      --text3: #718096;
      --accent: #0057b8;
      --radius: 12px;
      --shadow: 0 2px 8px rgba(0,0,0,0.07);
      --shadow-hover: 0 8px 24px rgba(0,0,0,0.13);
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Inter', system-ui, sans-serif;
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
    }

    /* в”Ђв”Ђ Header в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    header {
      background: var(--accent);
      color: #fff;
      padding: 0 28px;
      display: flex;
      align-items: center;
      gap: 16px;
      height: 58px;
      position: sticky;
      top: 0;
      z-index: 300;
      box-shadow: 0 2px 12px rgba(0,63,150,0.28);
    }
    .logo { display: flex; align-items: center; gap: 10px; }
    .logo-icon {
      width: 32px; height: 32px;
      background: #ffffff;
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .logo h1 { font-size: 15px; font-weight: 700; }
    .logo p  { font-size: 11px; opacity: 0.72; }
    .hsp { flex: 1; }
    #status-bar { font-size: 11px; opacity: 0.8; }

    /* в”Ђв”Ђ Toolbar в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    .toolbar {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 10px 28px;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      position: sticky;
      top: 58px;
      z-index: 200;
    }
    .flabel {
      font-size: 10px; font-weight: 700; color: var(--text3);
      text-transform: uppercase; letter-spacing: 0.08em;
    }
    select {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; color: var(--text);
      font-size: 13px; font-family: inherit;
      padding: 6px 10px; cursor: pointer; outline: none;
      transition: border-color 0.2s;
    }
    select:focus { border-color: var(--accent); }
    .search-wrap {
      display: flex; align-items: center;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 8px; padding: 0 10px; gap: 7px;
      flex: 1; max-width: 320px;
      transition: border-color 0.2s;
    }
    .search-wrap:focus-within { border-color: var(--accent); }
    .search-wrap svg { color: var(--text3); flex-shrink: 0; }
    #search-box {
      background: transparent; border: none; outline: none;
      font-size: 13px; font-family: inherit; color: var(--text);
      padding: 6px 0; width: 100%;
    }
    #search-box::placeholder { color: var(--text3); }
    .tsep { width: 1px; height: 22px; background: var(--border); }
    #result-count { font-size: 12px; color: var(--text3); white-space: nowrap; }

    /* в”Ђв”Ђ Abas в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    .tabs-outer {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 101px;
      z-index: 100;
      display: flex;
      align-items: center;
    }
    .tabs-scroll-btn {
      flex-shrink: 0;
      width: 36px; height: 48px;
      display: flex; align-items: center; justify-content: center;
      background: var(--white);
      border: none; cursor: pointer;
      color: var(--text3);
      font-size: 18px;
      transition: color 0.15s;
      z-index: 1;
    }
    .tabs-scroll-btn:hover { color: var(--accent); }
    .tabs-scroll-btn.hidden { visibility: hidden; pointer-events: none; }
    .tabs-bar {
      flex: 1;
      overflow-x: auto;
      scroll-behavior: smooth;
      scrollbar-width: none;
    }
    .tabs-bar::-webkit-scrollbar { display: none; }
    .tabs { display: flex; }
    .tab {
      display: flex; align-items: center; gap: 5px;
      padding: 0 15px; height: 48px;
      font-size: 13px; font-weight: 500; color: var(--text3);
      cursor: pointer; white-space: nowrap; user-select: none;
      border-bottom: 3px solid transparent;
      transition: color 0.15s, border-color 0.15s;
      flex-shrink: 0;
    }
    .tab:hover { color: var(--text); }
    .tab.active { color: var(--accent); border-bottom-color: var(--accent); font-weight: 600; }
    .tab-count {
      background: #edf2ff; color: var(--accent);
      font-size: 10px; font-weight: 700;
      padding: 1px 6px; border-radius: 20px; min-width: 20px; text-align: center;
    }
    .tab.active .tab-count { background: var(--accent); color: #fff; }

    /* в”Ђв”Ђ Grid 3 colunas fixas в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    main {
      max-width: 1280px;
      margin: 0 auto;
      padding: 24px 28px;
    }
    .cards-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
    }
    @media (max-width: 900px) {
      .cards-grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 560px) {
      .cards-grid { grid-template-columns: 1fr; }
      header { padding: 0 14px; }
      .toolbar { padding: 8px 14px; }
      main { padding: 14px; }
    }

    /* в”Ђв”Ђ Card в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      display: flex;
      flex-direction: column;
      transition: box-shadow 0.2s, transform 0.18s;
    }
    .card:hover {
      box-shadow: var(--shadow-hover);
      transform: translateY(-3px);
    }

    /* Imagem */
    .card-image {
      position: relative;
      height: 185px;
      overflow: hidden;
      background: var(--border);
      flex-shrink: 0;
    }
    .card-image img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      transition: transform 0.3s;
    }
    .card:hover .card-image img { transform: scale(1.04); }

    /* Fallback sem imagem */
    .no-image {
      width: 100%; height: 100%;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 8px; color: rgba(255,255,255,0.9);
      font-size: 11px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.06em;
    }
    .no-image .ni-icon { font-size: 30px; }

    /* Gradientes por categoria */
    .cat-aviacao       { background: linear-gradient(135deg,#0ea5e9,#0057b8); }
    .cat-hotelaria     { background: linear-gradient(135deg,#f59e0b,#d97706); }
    .cat-destinos      { background: linear-gradient(135deg,#10b981,#059669); }
    .cat-atrativos     { background: linear-gradient(135deg,#8b5cf6,#7c3aed); }
    .cat-cruzeiros     { background: linear-gradient(135deg,#06b6d4,#0891b2); }
    .cat-distribuicao  { background: linear-gradient(135deg,#f97316,#ea580c); }
    .cat-corporativo   { background: linear-gradient(135deg,#6366f1,#4f46e5); }
    .cat-eventos       { background: linear-gradient(135deg,#ec4899,#db2777); }
    .cat-cambio        { background: linear-gradient(135deg,#eab308,#ca8a04); }
    .cat-politica      { background: linear-gradient(135deg,#64748b,#475569); }
    .cat-default       { background: linear-gradient(135deg,#94a3b8,#64748b); }

    /* Badge de categoria sobreposto na imagem */
    .img-cat-badge {
      position: absolute; bottom: 8px; left: 8px;
      background: rgba(0,0,0,0.52);
      color: #fff; font-size: 9px; font-weight: 700;
      text-transform: uppercase; letter-spacing: 0.07em;
      padding: 2px 8px; border-radius: 20px;
      backdrop-filter: blur(3px);
      max-width: calc(100% - 16px);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    }

    /* Corpo */
    .card-body {
      padding: 14px 16px 10px;
      display: flex; flex-direction: column; gap: 7px;
      flex: 1;
    }
    .card-date {
      font-size: 11px; color: var(--text3); font-weight: 500;
    }
    .card-title {
      font-size: 14px; font-weight: 700; color: var(--text);
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .card-desc {
      font-size: 12px; color: var(--text2); line-height: 1.55;
      display: -webkit-box;
      -webkit-line-clamp: 3; -webkit-box-orient: vertical;
      overflow: hidden; flex: 1;
    }

    /* RodapГ©: fonte + botГЈo */
    .card-footer {
      padding: 0 16px 14px;
      display: flex; align-items: center; justify-content: space-between;
      gap: 8px;
    }
    .source-label {
      font-size: 11px; font-weight: 600;
      color: var(--text3);
      display: flex; align-items: center; gap: 4px;
    }
    .source-dot {
      width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
    }
    .dot-panrotas        { background: #1d4ed8; }
    .dot-mercadoeeventos { background: #7c3aed; }
    .dot-embratur        { background: #0891b2; }
    .dot-g1_turismo      { background: #dc2626; }
    .dot-agenciabrasil   { background: #16a34a; }
    .dot-default         { background: #64748b; }

    .btn-ver-mais {
      display: inline-flex; align-items: center; gap: 5px;
      background: var(--accent); color: #fff;
      font-size: 12px; font-weight: 600;
      padding: 7px 15px; border-radius: 8px;
      text-decoration: none; border: none; cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      white-space: nowrap; flex-shrink: 0;
    }
    .btn-ver-mais:hover { background: #004099; transform: scale(1.02); }

    /* Flag geopolГ­tica */
    .geo-flag {
      font-size: 10px; color: #92400e; background: #fef3c7;
      padding: 2px 7px; border-radius: 20px; font-weight: 600;
      display: inline-flex; align-items: center; gap: 3px;
    }

    /* в”Ђв”Ђ Estados в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    .state-msg {
      text-align: center; padding: 80px 20px; color: var(--text3);
      grid-column: 1 / -1;
    }
    .state-msg .icon { font-size: 44px; display: block; margin-bottom: 14px; }
    .state-msg p { font-size: 15px; }
    .spinner {
      width: 34px; height: 34px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 18px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Highlight de busca */
    mark { background: #fef08a; color: inherit; border-radius: 2px; padding: 0 1px; }

    /* в”Ђв”Ђ Mobile в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ */
    @media (max-width: 640px) {
      header {
        padding: 0 12px;
        height: auto;
        min-height: 52px;
        flex-wrap: wrap;
        gap: 8px;
        padding-top: 10px;
        padding-bottom: 10px;
      }
      .logo { gap: 8px; flex: 1; min-width: 0; }
      .logo-icon { width: 28px; height: 28px; flex-shrink: 0; }
      .logo h1 { font-size: 13px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
      .logo p  { display: none; } /* oculta lista de fontes no mobile */
      .hsp { display: none; }
      #status-bar { font-size: 10px; width: 100%; text-align: right; opacity: 0.7; padding-bottom: 2px; }

      .toolbar {
        padding: 8px 12px;
        top: 52px;
        gap: 6px;
      }
      .flabel { display: none; } /* remove labels Ano/MГЄs para economizar espaГ§o */
      select { font-size: 12px; padding: 5px 8px; }
      .search-wrap { max-width: 100%; flex: 1 1 100%; order: 3; }
      .tsep { display: none; }
      #result-count { display: none; }

      .tabs-outer { top: 113px; }
      .tabs-scroll-btn { width: 28px; }
      .tab { padding: 0 10px; font-size: 12px; height: 40px; }

      main { padding: 12px; }
      .cards-grid { gap: 14px; }
    }
  </style>
</head>
<body>

<header>
  <div class="logo">
    <div class="logo-icon"><img src="./favicon.ico" alt="Iter" width="22" height="22" style="display:block;"></div>
    <div>
      <h1>Monitor - Acontece no Mercado</h1>
      <p>Panrotas В· M&amp;E В· G1 В· Embratur В· AgГЄncia Brasil</p>
    </div>
  </div>
  <div class="hsp"></div>
  <div id="status-bar">Carregando...</div>
</header>

<div class="toolbar">
  <span class="flabel">Ano</span>
  <select id="sel-ano"><option value="">Todos</option></select>
  <span class="flabel">MГЄs</span>
  <select id="sel-mes"><option value="">Todos</option></select>
  <div class="tsep"></div>
  <div class="search-wrap">
    <svg width="14" height="14" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
      <circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/>
    </svg>
    <input type="text" id="search-box" placeholder="Buscar por palavras-chave...">
  </div>
  <div id="result-count"></div>
</div>

<div class="tabs-outer">
  <button class="tabs-scroll-btn hidden" id="tabs-left" title="Anterior">&#8249;</button>
  <div class="tabs-bar" id="tabs-bar">
    <div class="tabs" id="tabs-container"></div>
  </div>
  <button class="tabs-scroll-btn hidden" id="tabs-right" title="PrГіxima">&#8250;</button>
</div>

<main>
  <div class="cards-grid" id="content">
    <div class="state-msg">
      <div class="spinner"></div>
      <p>Carregando notГ­cias...</p>
    </div>
  </div>
</main>

<script>
// в”Ђв”Ђ Config в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
const BASE = './dados';

const CATEGORIES = [
  { key: 'Todos',                         label: 'Todas',                   icon: 'рџ“°', css: 'default' },
  { key: 'AviaГ§ГЈo',                        label: 'AviaГ§ГЈo',                  icon: 'вњ€пёЏ',  css: 'aviacao' },
  { key: 'Hotelaria',                      label: 'Hotelaria',                icon: 'рџЏЁ', css: 'hotelaria' },
  { key: 'Destinos',                       label: 'Destinos',                 icon: 'рџ—єпёЏ',  css: 'destinos' },
  { key: 'Atrativos e Parques',            label: 'Atrativos e Parques',      icon: 'рџЋў', css: 'atrativos' },
  { key: 'Cruzeiros',                      label: 'Cruzeiros',                icon: 'рџљў', css: 'cruzeiros' },
  { key: 'DistribuiГ§ГЈo e Trade',           label: 'DistribuiГ§ГЈo e Trade',     icon: 'рџ¤ќ', css: 'distribuicao' },
  { key: 'Corporativo',                    label: 'Corporativo',              icon: 'рџ’ј', css: 'corporativo' },
  { key: 'Eventos e Feiras',               label: 'Eventos e Feiras',         icon: 'рџЋЄ', css: 'eventos' },
  { key: 'CГўmbio e Economia do Turismo',  label: 'CГўmbio e Economia',        icon: 'рџ’°', css: 'cambio' },
  { key: 'PolГ­tica e RegulaГ§ГЈo Setorial', label: 'PolГ­tica e RegulaГ§ГЈo',     icon: 'вљ–пёЏ',  css: 'politica' },
];

const SOURCE_LABEL = {
  panrotas: 'Panrotas',
  mercadoeeventos: 'Mercado & Eventos',
  embratur: 'Embratur',
  g1_turismo: 'G1 Turismo',
  agenciabrasil: 'AgГЄncia Brasil',
};

const MES_NOME = ['','Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];

// в”Ђв”Ђ Estado в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
let allItems = [], availableMonths = [], loadedMonths = new Set(), activeTab = 'Todos';

// в”Ђв”Ђ Helpers в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function norm(s) {
  return (s||'').normalize('NFD').replace(/[МЂ-НЇ]/g,'').toLowerCase().trim();
}
function esc(s) {
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escRe(s) { return s.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'); }

// Decodifica entidades HTML (&#227; в†’ ГЈ) antes de exibir
function decodeHtml(s) {
  if (!s) return '';
  const t = document.createElement('textarea');
  t.innerHTML = s;
  return t.value;
}

function highlight(text, words) {
  if (!words.length || !text) return esc(decodeHtml(text));
  let out = esc(decodeHtml(text));
  words.forEach(w => {
    const re = new RegExp('(' + escRe(esc(decodeHtml(w))) + ')', 'gi');
    out = out.replace(re, '<mark>$1</mark>');
  });
  return out;
}

function fmtDate(iso) {
  if (!iso) return '';
  try {
    return new Date(iso).toLocaleDateString('pt-BR', {day:'2-digit',month:'short',year:'numeric'});
  } catch(e) { return iso.slice(0,10); }
}

function catCss(l1) {
  const m = {
    'AviaГ§ГЈo':'aviacao','Hotelaria':'hotelaria','Destinos':'destinos',
    'Atrativos e Parques':'atrativos','Cruzeiros':'cruzeiros',
    'DistribuiГ§ГЈo e Trade':'distribuicao','Corporativo':'corporativo',
    'Eventos e Feiras':'eventos','CГўmbio e Economia do Turismo':'cambio',
    'PolГ­tica e RegulaГ§ГЈo Setorial':'politica',
  };
  return m[l1] || 'default';
}
function catIcon(l1) { return (CATEGORIES.find(c=>c.key===l1)||{icon:'рџ“°'}).icon; }

// в”Ђв”Ђ Fetch в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function fetchJSON(url) {
  const r = await fetch(url + '?v=' + Date.now());
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// в”Ђв”Ђ Init в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function init() {
  let index;
  try { index = await fetchJSON(BASE + '/indice-meses.json'); }
  catch(e) {
    setStatus('Erro ao carregar.');
    document.getElementById('content').innerHTML =
      '<div class="state-msg"><span class="icon">вљ пёЏ</span><p>NГЈo foi possГ­vel carregar os dados.</p></div>';
    return;
  }
  availableMonths = Object.keys(index).sort().reverse();
  populateAno();
  updateMes();
  buildTabs();
  // Carrega todos os meses na inicializaГ§ГЈo
  if (availableMonths.length) await loadMonths(availableMonths);
  setStatus('Atualizado em ' + new Date().toLocaleDateString('pt-BR',{day:'2-digit',month:'short',year:'numeric'}));
}

// в”Ђв”Ђ Filtros в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function populateAno() {
  const anos = [...new Set(availableMonths.map(m=>m.slice(0,4)))].sort().reverse();
  const s = document.getElementById('sel-ano');
  s.innerHTML = '<option value="">Todos os anos</option>';
  anos.forEach(a => s.innerHTML += `<option value="${a}">${a}</option>`);
}
function updateMes() {
  const ano = document.getElementById('sel-ano').value;
  const s = document.getElementById('sel-mes');
  const prev = s.value;
  s.innerHTML = '<option value="">Todos os meses</option>';
  availableMonths.filter(m => !ano || m.startsWith(ano)).forEach(m => {
    const [y,mo] = m.split('-');
    s.innerHTML += `<option value="${m}">${MES_NOME[+mo]} ${y}</option>`;
  });
  if ([...s.options].some(o=>o.value===prev)) s.value = prev;
}

// в”Ђв”Ђ Tabs в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function buildTabs() {
  const c = document.getElementById('tabs-container');
  c.innerHTML = '';
  CATEGORIES.forEach(cat => {
    const tab = document.createElement('div');
    tab.className = 'tab' + (cat.key===activeTab?' active':'');
    tab.dataset.key = cat.key;
    tab.innerHTML = `${cat.icon} ${cat.label} <span class="tab-count" id="cnt-${cat.key.replace(/\s+/g,'_')}">0</span>`;
    tab.addEventListener('click', () => {
      activeTab = cat.key;
      document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));
      tab.classList.add('active');
      applyAndRender();
    });
    c.appendChild(tab);
  });
  updateScrollBtns();
}

// Scroll arrows das abas
function updateScrollBtns() {
  const bar = document.getElementById('tabs-bar');
  const btnL = document.getElementById('tabs-left');
  const btnR = document.getElementById('tabs-right');
  if (!bar) return;
  const canLeft  = bar.scrollLeft > 4;
  const canRight = bar.scrollLeft + bar.clientWidth < bar.scrollWidth - 4;
  btnL.classList.toggle('hidden', !canLeft);
  btnR.classList.toggle('hidden', !canRight);
}
document.getElementById('tabs-bar').addEventListener('scroll', updateScrollBtns);
document.getElementById('tabs-left').addEventListener('click', () => {
  document.getElementById('tabs-bar').scrollBy({left: -200, behavior:'smooth'});
});
document.getElementById('tabs-right').addEventListener('click', () => {
  document.getElementById('tabs-bar').scrollBy({left: 200, behavior:'smooth'});
});
window.addEventListener('resize', updateScrollBtns);

// в”Ђв”Ђ Carga de meses в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
async function loadMonths(months) {
  const toLoad = months.filter(m => !loadedMonths.has(m));
  if (!toLoad.length) { applyAndRender(); return; }
  showLoading();
  for (const m of toLoad) {
    try {
      const data = await fetchJSON(`${BASE}/${m}.json`);
      data.forEach(item => { if (!allItems.find(i=>i.guid===item.guid)) allItems.push(item); });
      loadedMonths.add(m);
    } catch(e) { console.warn('Erro ao carregar', m); }
  }
  applyAndRender();
}

async function loadForSelection() {
  const ano = document.getElementById('sel-ano').value;
  const mes = document.getElementById('sel-mes').value;
  let months;
  if (mes) months = [mes];
  else if (ano) months = availableMonths.filter(m=>m.startsWith(ano));
  else months = availableMonths; // sem filtro = todos os meses
  await loadMonths(months);
}

// в”Ђв”Ђ Filtros + render в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function applyAndRender() {
  const ano   = document.getElementById('sel-ano').value;
  const mes   = document.getElementById('sel-mes').value;
  const query = document.getElementById('search-box').value.trim();
  const words = query ? query.toLowerCase().split(/\s+/).filter(Boolean) : [];

  let items = allItems.filter(item => {
    const pub = (item.pub_date||'').slice(0,7);
    if (mes && pub!==mes) return false;
    if (ano && !pub.startsWith(ano)) return false;
    return true;
  });

  if (words.length) {
    items = items.filter(item => {
      const hay = norm(decodeHtml((item.title||'') + ' ' + (item.description||'')));
      return words.every(w => hay.includes(norm(w)));
    });
  }

  const counts = {};
  CATEGORIES.forEach(c => counts[c.key] = 0);
  items.forEach(item => {
    const l1 = item.canonical_category_l1||'';
    if (counts[l1]!==undefined) counts[l1]++;
    // GeopolГ­tica tambГ©m conta em PolГ­tica e RegulaГ§ГЈo Setorial
    if (item.content_domain === 'geopolitica_relevante' && l1 !== 'PolГ­tica e RegulaГ§ГЈo Setorial') {
      counts['PolГ­tica e RegulaГ§ГЈo Setorial']++;
    }
    counts['Todos']++;
  });
  CATEGORIES.forEach(cat => {
    const el = document.getElementById('cnt-'+cat.key.replace(/\s+/g,'_'));
    if (el) el.textContent = counts[cat.key]||0;
  });

  let visible = activeTab==='Todos' ? items : items.filter(i => {
    if (i.canonical_category_l1 === activeTab) return true;
    // GeopolГ­tica tambГ©m aparece em PolГ­tica e RegulaГ§ГЈo Setorial
    if (activeTab === 'PolГ­tica e RegulaГ§ГЈo Setorial' && i.content_domain === 'geopolitica_relevante') return true;
    return false;
  });
  visible.sort((a,b) => {
    const ds = (b.destaque_score||0)-(a.destaque_score||0);
    if (Math.abs(ds)>0.01) return ds;
    return (b.pub_date||'')>(a.pub_date||'') ? 1 : -1;
  });

  const n = visible.length;
  document.getElementById('result-count').textContent = n + (n===1?' notГ­cia':' notГ­cias');
  renderCards(visible, words);
  setTimeout(updateScrollBtns, 50);
}

// в”Ђв”Ђ Image fallback (funГ§ГЈo nomeada evita HTML dentro de atributos) в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function imgFallback(img, css, icon, cat) {
  const p = img.parentElement;
  p.innerHTML =
    '<div class="no-image cat-' + css + '"><span class="ni-icon">' + icon +
    '</span><span>' + cat + '</span></div>' +
    '<span class="img-cat-badge">' + cat + '</span>';
}

// в”Ђв”Ђ Render в”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђв”Ђ
function imageBlock(item) {
  const css  = catCss(item.canonical_category_l1);
  const icon = catIcon(item.canonical_category_l1);
  const cat  = esc(item.canonical_category_l1 || 'Turismo');

  const badge = '<span class="img-cat-badge">' + cat + '</span>';

  if (item.image_url) {
    // onerror chama funГ§ГЈo nomeada вЂ” sem HTML inline no atributo
    return '<div class="card-image">' +
      '<img src="' + esc(item.image_url) + '" alt="" loading="lazy"' +
      ' onerror="imgFallback(this,\'' + css + '\',\'' + icon + '\',\'' + cat + '\')">' +
      badge + '</div>';
  }
  return '<div class="card-image">' +
    '<div class="no-image cat-' + css + '"><span class="ni-icon">' + icon +
    '</span><span>' + cat + '</span></div>' +
    badge + '</div>';
}

function cardHTML(item, words) {
  const src   = item.source_id || '';
  const srcLb = esc(SOURCE_LABEL[src] || src);
  const domain = item.content_domain || '';
  const geoFlag = domain==='geopolitica_relevante'
    ? '<span class="geo-flag">рџЊђ GeopolГ­tica</span>' : '';

  return `<div class="card">
  ${imageBlock(item)}
  <div class="card-body">
    <div class="card-date">${fmtDate(item.pub_date)} ${geoFlag}</div>
    <div class="card-title">${highlight(item.title, words)}</div>
    ${item.description ? `<div class="card-desc">${highlight(item.description, words)}</div>` : ''}
  </div>
  <div class="card-footer">
    <span class="source-label">
      <span class="source-dot dot-${src}"></span>
      ${srcLb}
    </span>
    <a class="btn-ver-mais" href="${esc(item.link||'#')}" target="_blank" rel="noopener">
      Ver mais
      <svg width="12" height="12" fill="none" stroke="currentColor" stroke-width="2.5" viewBox="0 0 24 24">
        <path d="M5 12h14M12 5l7 7-7 7"/>
      </svg>
    </a>
  </div>
</div>`;
}

function renderCards(items, words) {
  const content = document.getElementById('content');
  if (!items.length) {
    const q = document.getElementById('search-box').value;
    content.innerHTML = `<div class="state-msg">
      <span class="icon">рџ”Ќ</span>
      <p>${q ? 'Nenhuma notГ­cia para "<strong>'+esc(q)+'</strong>".' : 'Nenhuma notГ­cia para este perГ­odo.'}</p>
    </div>`;
    return;
  }
  content.innerHTML = items.map(i => cardHTML(i, words)).join('');
}

function showLoading() {
  document.getElementById('content').innerHTML =
    '<div class="state-msg"><div class="spinner"></div><p>Carregando notГ­cias...</p></div>';
}
function setStatus(msg) { document.getElementById('status-bar').textContent = msg; }

// в”Ђв”Ђ Eventos в
